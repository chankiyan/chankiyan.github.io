<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ki Yan Chan - Personal Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #ffffff;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 50px 20px;
            text-align: center;
        }
        h1 {
            color: #ffffff;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2em;
            line-height: 1.6;
            color: #cccccc;
        }
        .highlight {
            color: #3498db;
            font-weight: bold;
        }
        .images-section {
            margin-top: 50px;
        }
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .image-container {
            text-align: center;
        }
        .image-container img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .image-caption {
            margin-top: 10px;
            font-size: 0.9em;
            color: #aaaaaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ki Yan Chan</h1>
        <p>What a cute pookie</p>
        
        <div class="images-section">
            <h2>Hot pics</h2>
            <div class="images-grid">
                <div class="image-container">
                    <img src="kiyan_linkedin.jpg">
                    <div class="image-caption">he's staring into your soul</div>
                </div>
                <div class="image-container">
                    <img src="business_1.jpg">
                    <div class="image-caption">such businessman</div>
                </div>
                <div class="image-container">
                    <img src="business_2.jpg">
                    <div class="image-caption">sexy</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
